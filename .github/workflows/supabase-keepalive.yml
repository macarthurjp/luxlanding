name: Supabase keep-alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf "https://itldyciokbtzwufrrifh.supabase.co/rest/v1/" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -o /dev/null
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
